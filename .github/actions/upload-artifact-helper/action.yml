name: Upload Artifact Helper
description: Upload artifacts with standardized inputs.
inputs:
  name:
    description: Artifact name.
    required: true
  path:
    description: File or directory path to upload.
    required: true
  retention_days:
    description: Retention period in days.
    required: false
    default: '30'
  if_no_files_found:
    description: Behavior when files are missing (warn, error, ignore).
    required: false
    default: warn
runs:
  using: composite
  steps:
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
        retention-days: ${{ inputs.retention_days }}
        if-no-files-found: ${{ inputs.if_no_files_found }}
