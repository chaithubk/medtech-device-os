name: Create Git Tag
description: Create and push a CI tag if it does not already exist.
inputs:
  tag_name:
    description: Full tag name to create.
    required: true
  target_sha:
    description: Commit SHA to tag. Defaults to current commit.
    required: false
    default: ""
  push_token:
    description: Optional token for pushing tags (must allow tagging commits that touch workflow files).
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Create and push tag
      shell: bash
      run: |
        set -euo pipefail

        TAG="${{ inputs.tag_name }}"
        TARGET_SHA="${{ inputs.target_sha }}"
        PUSH_TOKEN="${{ inputs.push_token }}"
        [[ -z "$TARGET_SHA" ]] && TARGET_SHA="${GITHUB_SHA}"

        if [[ -z "$TAG" ]]; then
          echo "tag_name input is required"
          exit 1
        fi

        # GitHub requires workflow-capable permissions when creating refs that point
        # to commits touching files under .github/workflows/.
        mapfile -t WORKFLOW_TOUCHED < <(git show --name-only --pretty='' "$TARGET_SHA" | grep '^.github/workflows/' || true)
        if (( ${#WORKFLOW_TOUCHED[@]} > 0 )) && [[ -z "$PUSH_TOKEN" ]]; then
          echo "Tag target commit touches workflow files, but push_token is not set." >&2
          echo "Affected workflow files:" >&2
          printf '  - %s\n' "${WORKFLOW_TOUCHED[@]}" >&2
          echo "Set repository secret CI_TAG_PUSH_TOKEN with workflow-capable permissions and pass it to create-git-tag.push_token." >&2
          exit 1
        fi

        git fetch --tags --quiet

        if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
          echo "Tag already exists locally: ${TAG}"
          exit 0
        fi

        if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
          echo "Tag already exists on origin: ${TAG}"
          exit 0
        fi

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        if [[ -n "$PUSH_TOKEN" ]]; then
          # actions/checkout persists GITHUB_TOKEN in http extraheaders by default.
          # Remove those headers so the explicit push_token is actually used.
          git config --local --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        fi

        git tag -a "${TAG}" "${TARGET_SHA}" -m "CI build tag ${TAG}"
        PUSH_ERR_FILE="$(mktemp)"
        if ! git push origin "refs/tags/${TAG}" 2>"$PUSH_ERR_FILE"; then
          if grep -qi 'refusing to allow a GitHub App to create or update workflow' "$PUSH_ERR_FILE"; then
            echo "Tag push blocked: token cannot tag commits that modify workflow files." >&2
            echo "Target SHA: ${TARGET_SHA}" >&2
            if [[ -z "$PUSH_TOKEN" ]]; then
              echo "Set workflow secret CI_TAG_PUSH_TOKEN (PAT/App token with workflow-capable permissions) and pass it to create-git-tag.push_token." >&2
            else
              echo "The provided push_token lacks required permissions. Use a token that can update refs for workflow-touching commits." >&2
            fi
          fi

          echo "Failed to push tag ${TAG}"
          cat "$PUSH_ERR_FILE" >&2
          rm -f "$PUSH_ERR_FILE"
          exit 1
        fi
        rm -f "$PUSH_ERR_FILE"

        echo "Created and pushed tag: ${TAG}"
