name: Prepare Prerelease Metadata
description: Compute prerelease tag and render shared prerelease release notes.
inputs:
  image_name:
    description: Image label for release notes (e.g. core-image-medtech-qemuarm64).
    required: true
  push_prefix:
    description: Tag prefix used when triggered by a branch push.
    required: true
  manual_prefix:
    description: Tag prefix used for non-push events (workflow_dispatch etc.).
    required: true
  ssh_mode:
    description: SSH access mode baked into this build (public-hardened or internal-keyed).
    required: false
    default: 'public-hardened'
  template_path:
    description: Path to prerelease template markdown.
    required: false
    default: .github/release-notes/prerelease-common.md
  output_notes_path:
    description: Output path for rendered release notes.
    required: false
    default: release-notes.md
  extra_notes:
    description: Optional markdown block appended after the rendered template.
    required: false
    default: ''
outputs:
  tag:
    description: Computed prerelease tag (e.g. dev-main-abc1234-r42.1).
    value: ${{ steps.meta.outputs.tag }}
  short_sha:
    description: Seven-character commit short SHA.
    value: ${{ steps.meta.outputs.short_sha }}
  prerelease:
    description: Whether the target release is a prerelease (always true here).
    value: ${{ steps.meta.outputs.prerelease }}
  make_latest:
    description: Whether GitHub should mark this release as latest (always false for prereleases).
    value: ${{ steps.meta.outputs.make_latest }}
  channel:
    description: Release channel name (prerelease).
    value: ${{ steps.meta.outputs.channel }}
runs:
  using: composite
  steps:
    - name: Compute prerelease tag and metadata
      id: meta
      shell: bash
      run: |
        set -euo pipefail

        SHORT_SHA="${GITHUB_SHA::7}"

        if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
          TAG="${{ inputs.push_prefix }}-${SHORT_SHA}-r${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
        else
          TAG="${{ inputs.manual_prefix }}-${SHORT_SHA}-r${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
        fi

        REPO_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"

        echo "tag=${TAG}"             >> "$GITHUB_OUTPUT"
        echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
        echo "repo_url=${REPO_URL}"   >> "$GITHUB_OUTPUT"
        echo "prerelease=true"        >> "$GITHUB_OUTPUT"
        echo "make_latest=false"      >> "$GITHUB_OUTPUT"
        echo "channel=prerelease"     >> "$GITHUB_OUTPUT"

    - name: Render release notes from template
      shell: bash
      run: |
        set -euo pipefail

        # Derive repo slug (owner/repo) from GITHUB_REPOSITORY
        REPO_SLUG="${GITHUB_REPOSITORY}"
        SSH_MODE="${{ inputs.ssh_mode }}"

        # Load SSH login content from mode-specific markdown file
        SSH_LOGIN_FILE=".github/release-notes/ssh-login-${SSH_MODE}.md"
        if [[ ! -f "$SSH_LOGIN_FILE" ]]; then
          echo "ERROR: SSH login template not found: $SSH_LOGIN_FILE"
          exit 1
        fi
        SSH_LOGIN_SECTION=$(cat "$SSH_LOGIN_FILE")

        # Escape newlines for sed replacement
        SSH_LOGIN_SECTION=$(printf '%s\n' "$SSH_LOGIN_SECTION" | sed ':a;N;$!ba;s/\n/\\n/g')

        sed \
          -e "s|{{VERSION}}|${{ steps.meta.outputs.tag }}|g" \
          -e "s|{{SHORT_SHA}}|${{ steps.meta.outputs.short_sha }}|g" \
          -e "s|{{COMMIT}}|${GITHUB_SHA}|g" \
          -e "s|{{BRANCH}}|${GITHUB_REF_NAME}|g" \
          -e "s|{{IMAGE}}|${{ inputs.image_name }}|g" \
          -e "s|{{SSH_MODE}}|${SSH_MODE}|g" \
          -e "s|{{SSH_LOGIN_SECTION}}|${SSH_LOGIN_SECTION}|g" \
          -e "s|{{REPO_URL}}|${{ steps.meta.outputs.repo_url }}|g" \
          -e "s|{{REPO_SLUG}}|${REPO_SLUG}|g" \
          "${{ inputs.template_path }}" > "${{ inputs.output_notes_path }}"

        if [[ -n "${{ inputs.extra_notes }}" ]]; then
          printf '\n---\n\n%s\n' "${{ inputs.extra_notes }}" >> "${{ inputs.output_notes_path }}"
        fi
