name: Promote Prerelease To Stable Release

# Promotion workflow purpose:
# - Reuse assets from an existing prerelease tag
# - Publish a stable semver release (patch/minor/major/custom)
# - Never rebuild Yocto in this workflow

on:
  workflow_dispatch:
    inputs:
      source_tag_selection:
        description: "How to choose source prerelease tag"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - manual
      source_tag:
        description: "Existing prerelease tag to promote (required when source_tag_selection=manual)"
        required: false
        default: ""
        type: string
      release_strategy:
        description: "Stable version strategy"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
      version:
        description: "Required when release_strategy=custom. Format: vMAJOR.MINOR.PATCH"
        required: false
        default: ""
        type: string
      make_latest:
        description: "Mark promoted stable release as latest"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      release_channel:
        description: "Publish target as prerelease or stable release"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - prerelease

permissions:
  contents: write

concurrency:
  group: promote-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  promote:
    name: Promote Existing Release Assets
    runs-on: ubuntu-22.04
    env:
      SOURCE_TAG_SELECTION: ${{ github.event.inputs.source_tag_selection }}
      SOURCE_TAG_INPUT: ${{ github.event.inputs.source_tag }}
      RELEASE_STRATEGY: ${{ github.event.inputs.release_strategy }}
      CUSTOM_VERSION: ${{ github.event.inputs.version }}
      RELEASE_CHANNEL: ${{ github.event.inputs.release_channel }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve source prerelease tag
        id: source
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            const selection = process.env.SOURCE_TAG_SELECTION;
            const sourceTagInput = process.env.SOURCE_TAG_INPUT;

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            const candidates = releases
              .filter(r => r.prerelease && (r.assets || []).length > 0)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            if (candidates.length === 0) {
              core.setFailed('No prerelease with assets was found to promote.');
              return;
            }

            let selected;
            if (selection === 'manual') {
              if (!sourceTagInput) {
                core.setFailed('source_tag is required when source_tag_selection=manual.');
                return;
              }
              selected = candidates.find(r => r.tag_name === sourceTagInput);
              if (!selected) {
                core.setFailed(`Requested source_tag '${sourceTagInput}' was not found among available prereleases with assets.`);
                return;
              }
            } else {
              selected = candidates[0];
            }

            core.setOutput('source_tag', selected.tag_name);
            core.setOutput('source_name', selected.name || selected.tag_name);
            core.setOutput('asset_count', String((selected.assets || []).length));

            const preview = candidates.slice(0, 10).map(r => `- ${r.tag_name} (${(r.assets || []).length} assets)`).join('\n');
            core.summary
              .addHeading('Available Source Prereleases')
              .addRaw(preview || '- none', true)
              .addHeading('Selected Source')
              .addRaw(`- ${selected.tag_name}`, true)
              .write();

      - name: Resolve release channel flags
        id: channel
        run: |
          set -euo pipefail
          if [[ "${RELEASE_CHANNEL}" == "prerelease" ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=${{ github.event.inputs.make_latest }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute target stable tag
        id: target
        run: |
          set -euo pipefail

          git fetch --tags --quiet

          if [[ "$RELEASE_STRATEGY" == "custom" ]]; then
            if [[ -z "$CUSTOM_VERSION" ]]; then
              echo "release_strategy=custom requires version input (vMAJOR.MINOR.PATCH)."
              exit 1
            fi
            if [[ ! "$CUSTOM_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid custom version '$CUSTOM_VERSION'. Expected vMAJOR.MINOR.PATCH."
              exit 1
            fi
            TARGET_TAG="$CUSTOM_VERSION"
          else
            LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)
            if [[ -z "$LATEST" ]]; then
              BASE_MAJOR=0
              BASE_MINOR=1
              BASE_PATCH=0
            else
              BASE_MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d 'v')
              BASE_MINOR=$(echo "$LATEST" | cut -d. -f2)
              BASE_PATCH=$(echo "$LATEST" | cut -d. -f3)
            fi

            case "$RELEASE_STRATEGY" in
              patch)
                TARGET_TAG="v${BASE_MAJOR}.${BASE_MINOR}.$((BASE_PATCH + 1))"
                ;;
              minor)
                TARGET_TAG="v${BASE_MAJOR}.$((BASE_MINOR + 1)).0"
                ;;
              major)
                TARGET_TAG="v$((BASE_MAJOR + 1)).0.0"
                ;;
              *)
                echo "Unsupported release_strategy: $RELEASE_STRATEGY"
                exit 1
                ;;
            esac
          fi

          if git rev-parse -q --verify "refs/tags/${TARGET_TAG}" >/dev/null; then
            echo "Target tag already exists: ${TARGET_TAG}"
            exit 1
          fi

          echo "target_tag=${TARGET_TAG}" >> "$GITHUB_OUTPUT"

      - name: Download source release assets
        uses: robinraju/release-downloader@v1.12
        with:
          repository: ${{ github.repository }}
          tag: ${{ steps.source.outputs.source_tag }}
          fileName: '*'
          out-file-path: promote-assets
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Show downloaded assets
        run: |
          set -euo pipefail
          ls -lh promote-assets
          COUNT=$(find promote-assets -maxdepth 1 -type f | wc -l)
          if [[ "$COUNT" -eq 0 ]]; then
            echo "No files were downloaded from source prerelease assets."
            exit 1
          fi

      - name: Write promotion summary
        run: |
          {
            echo "## Promotion Summary"
            echo "- Source prerelease tag: ${{ steps.source.outputs.source_tag }}"
            echo "- Source release name: ${{ steps.source.outputs.source_name }}"
            echo "- Source asset count: ${{ steps.source.outputs.asset_count }}"
            echo "- Version strategy: ${RELEASE_STRATEGY}"
            echo "- Target tag: ${{ steps.target.outputs.target_tag }}"
            echo "- Target channel: ${RELEASE_CHANNEL}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve source commit from manifest
        id: source_meta
        run: |
          set -euo pipefail
          MANIFEST=$(find promote-assets -maxdepth 1 -name '*-manifest.json' | head -1 || true)
          COMMIT=""
          SHORT_SHA=""
          IMAGE_NAME=""
          SSH_MODE="public-hardened"
          if [[ -n "$MANIFEST" ]]; then
            mapfile -t META_FIELDS < <(python3 - "$MANIFEST" <<'PY'
              import json
              import sys

              manifest_path = sys.argv[1]
              commit = ""
              image = ""
              ssh_mode = "public-hardened"

              try:
                with open(manifest_path, "r", encoding="utf-8") as fh:
                  data = json.load(fh)
                commit = data.get("commit") or data.get("build_commit") or ""
                image = data.get("image") or ""
                ssh_mode = data.get("ssh_mode") or "public-hardened"
              except Exception:
                pass

              print(commit)
              print(image)
              print(ssh_mode)
              PY
            )
            COMMIT="${META_FIELDS[0]:-}"
            IMAGE_NAME="${META_FIELDS[1]:-}"
            SSH_MODE="${META_FIELDS[2]:-public-hardened}"
          fi
          [[ -z "$COMMIT" ]] && COMMIT="${GITHUB_SHA}"
          SHORT_SHA="${COMMIT::7}"
          [[ -z "$IMAGE_NAME" ]] && IMAGE_NAME="core-image-medtech-qemuarm64"
          echo "commit=${COMMIT}"       >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE_NAME}"    >> "$GITHUB_OUTPUT"
          echo "ssh_mode=${SSH_MODE}"   >> "$GITHUB_OUTPUT"

      - name: Render stable release notes
        id: render_notes
        run: |
          set -euo pipefail
          TEMPLATE=".github/release-notes/stable-release.md"
          OUTPUT="stable-release-notes.md"
          REPO_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          REPO_SLUG="${GITHUB_REPOSITORY}"

          sed \
            -e "s|{{TARGET_TAG}}|${{ steps.target.outputs.target_tag }}|g" \
            -e "s|{{SOURCE_TAG}}|${{ steps.source.outputs.source_tag }}|g" \
            -e "s|{{IMAGE}}|${{ steps.source_meta.outputs.image }}|g" \
            -e "s|{{COMMIT}}|${{ steps.source_meta.outputs.commit }}|g" \
            -e "s|{{SHORT_SHA}}|${{ steps.source_meta.outputs.short_sha }}|g" \
            -e "s|{{SSH_MODE}}|${{ steps.source_meta.outputs.ssh_mode }}|g" \
            -e "s|{{REPO_URL}}|${REPO_URL}|g" \
            -e "s|{{REPO_SLUG}}|${REPO_SLUG}|g" \
            "$TEMPLATE" > "$OUTPUT"

          echo "notes_path=${OUTPUT}" >> "$GITHUB_OUTPUT"

      - name: Create release from promoted assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.target.outputs.target_tag }}
          files: promote-assets/*
          body_path: ${{ steps.render_notes.outputs.notes_path }}
          prerelease: ${{ steps.channel.outputs.prerelease }}
          draft: false
          generate_release_notes: false
          make_latest: ${{ steps.channel.outputs.make_latest }}
