name: Promote CI Build To Release

# ---------------------------------------------------------------------------
# RELEASE PROCESS — how to use this workflow
# ---------------------------------------------------------------------------
# PURPOSE
#   Promotes a successful CI build (identified by its dev-* git tag) to a
#   versioned GitHub Release. Yocto is never re-run here.
#   Artifacts are downloaded directly from the originating workflow run.
#
# TAG FORMAT
#   Each image type has its own independent semver sequence:
#     core-image-minimal-v1.0.0
#     core-image-medtech-v2.3.1
#   This allows both image types to coexist as separate stable releases.
#   "Latest for image X" = highest semver tag with prefix "{image_type}-v*".
#   GitHub's repo-wide "latest" flag is never used.
#
# TYPICAL STEPS
#   1. A build workflow runs successfully and creates a dev-* git tag, e.g.:
#        dev-core-image-minimal-qemuarm64-82521d2-r6.1
#   2. Run THIS workflow:
#      - image_type      : which image this release is for.
#      - source_tag      : the exact dev-* git tag from step 1, or leave empty
#                          to auto-select the latest dev-* tag for this image.
#      - artifact_name   : workflow run artifact holding the release bundle.
#      - release_strategy: patch / minor / major / custom
#                          Semver is computed independently per image type.
#      - release_channel : "prerelease" to publish for testing first;
#                          "release" to publish directly as stable.
#   3. The workflow creates a GitHub Release tagged {image_type}-vX.Y.Z.
#      make_latest is NEVER set — each image type manages its own latest.
#
# MARKING AS STABLE (after prerelease testing)
#   If release_channel=prerelease, once validated run:
#     .github/workflows/mark-release-stable.yml
#   That workflow flips prerelease=false. make_latest is not touched.
# ---------------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      image_type:
        description: "Image type being released. Determines the tag prefix and semver sequence."
        required: true
        default: "core-image-minimal"
        type: choice
        options:
          - core-image-minimal
          - core-image-medtech
      source_tag:
        description: "CI git tag to promote (e.g. dev-core-image-minimal-qemuarm64-82521d2-r6.1). Leave empty to auto-select the latest dev-* tag for this image type."
        required: false
        default: ""
        type: string
      artifact_name:
        description: "Workflow run artifact containing the release bundle."
        required: true
        default: "core-image-minimal-analysis"
        type: choice
        options:
          - core-image-minimal-analysis
          - qemu-image-medtech
      release_strategy:
        description: "Stable version strategy"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
      version:
        description: "Required when release_strategy=custom. Format: vMAJOR.MINOR.PATCH"
        required: false
        default: ""
        type: string
      release_channel:
        description: "Publish target as prerelease or stable release"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - prerelease

permissions:
  contents: write

concurrency:
  group: promote-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint-workflows:
    name: Lint Workflows
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Lint all workflows with actionlint
        uses: ./.github/actions/lint-workflows
  promote:
    name: Promote Existing Release Assets
    runs-on: ubuntu-22.04
    env:
      IMAGE_TYPE: ${{ github.event.inputs.image_type }}
      SOURCE_TAG_INPUT: ${{ github.event.inputs.source_tag }}
      ARTIFACT_NAME: ${{ github.event.inputs.artifact_name }}
      RELEASE_STRATEGY: ${{ github.event.inputs.release_strategy }}
      CUSTOM_VERSION: ${{ github.event.inputs.version }}
      RELEASE_CHANNEL: ${{ github.event.inputs.release_channel }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve source CI tag and workflow run
        id: source
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            const sourceTagInput = (process.env.SOURCE_TAG_INPUT || '').trim();
            const imageType = (process.env.IMAGE_TYPE || '').trim();

            // List all tags, look for dev-* CI tags produced by build workflows
            const allTags = await github.paginate(github.rest.repos.listTags, {
              owner,
              repo,
              per_page: 100,
            });

            let selectedTag;
            if (sourceTagInput) {
              selectedTag = allTags.find(t => t.name === sourceTagInput);
              if (!selectedTag) {
                core.setFailed(`Git tag '${sourceTagInput}' was not found in this repository.`);
                return;
              }
            } else {
              // Auto-select: prefer dev-* tags that contain the image type name
              const devTags = allTags.filter(t =>
                t.name.startsWith('dev-') &&
                (imageType ? t.name.includes(imageType) : true)
              );
              if (devTags.length === 0) {
                core.setFailed(
                  `No dev-* CI tags found${imageType ? ` matching image type '${imageType}'` : ''}. ` +
                  `Run a build workflow first, or specify source_tag explicitly.`
                );
                return;
              }
              selectedTag = devTags[0];
            }

            const tagName = selectedTag.name;
            const commitSha = selectedTag.commit.sha;

            // Parse run number from tag — expected format: ...-r<N>.<attempt>
            const runMatch = tagName.match(/-r(\d+)\.\d+$/);
            if (!runMatch) {
              core.setFailed(`Cannot parse run number from tag '${tagName}'. Expected format ending in -r<N>.<attempt> (e.g. dev-core-image-minimal-qemuarm64-abc1234-r6.1).`);
              return;
            }
            const runNumber = parseInt(runMatch[1], 10);

            // Find the successful workflow run that created this tag
            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner,
              repo,
              head_sha: commitSha,
              status: 'success',
              per_page: 50,
            });

            const matchingRun = runs.find(r => r.run_number === runNumber);
            if (!matchingRun) {
              core.setFailed(
                `No successful workflow run #${runNumber} found for commit ${commitSha.slice(0, 7)} (tag: ${tagName}).\n` +
                `Ensure the build run completed successfully and the artifact '${process.env.ARTIFACT_NAME}' was uploaded.`
              );
              return;
            }

            core.setOutput('source_tag', tagName);
            core.setOutput('source_name', matchingRun.display_title || tagName);
            core.setOutput('run_id', String(matchingRun.id));

            const devTagPreview = allTags
              .filter(t => t.name.startsWith('dev-') && (imageType ? t.name.includes(imageType) : true))
              .slice(0, 10)
              .map(t => `- ${t.name}`)
              .join('\n');
            core.summary
              .addHeading('Available CI Tags')
              .addRaw(devTagPreview || '- none', true)
              .addHeading('Selected Source')
              .addRaw(`- ${tagName} → run #${runNumber} (run_id: ${matchingRun.id})`, true)
              .write();

      - name: Resolve release channel flags
        id: channel
        run: |
          set -euo pipefail
          if [[ "${RELEASE_CHANNEL}" == "prerelease" ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute target stable tag
        id: target
        run: |
          set -euo pipefail

          git fetch --tags --quiet

          # Tag format: {image_type}-vMAJOR.MINOR.PATCH
          # Semver is tracked independently per image type.
          TAG_PREFIX="${IMAGE_TYPE}-v"

          if [[ "$RELEASE_STRATEGY" == "custom" ]]; then
            if [[ -z "$CUSTOM_VERSION" ]]; then
              echo "release_strategy=custom requires version input (vMAJOR.MINOR.PATCH)."
              exit 1
            fi
            if [[ ! "$CUSTOM_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid custom version '$CUSTOM_VERSION'. Expected vMAJOR.MINOR.PATCH."
              exit 1
            fi
            TARGET_TAG="${IMAGE_TYPE}-${CUSTOM_VERSION}"
          else
            # Find the latest semver tag for THIS image type only
            LATEST=$(git tag -l "${TAG_PREFIX}[0-9]*.[0-9]*.[0-9]*" \
              | sed "s|^${TAG_PREFIX}||" \
              | sort -V \
              | tail -1)
            if [[ -z "$LATEST" ]]; then
              BASE_MAJOR=0
              BASE_MINOR=1
              BASE_PATCH=0
            else
              BASE_MAJOR=$(echo "$LATEST" | cut -d. -f1)
              BASE_MINOR=$(echo "$LATEST" | cut -d. -f2)
              BASE_PATCH=$(echo "$LATEST" | cut -d. -f3)
            fi

            case "$RELEASE_STRATEGY" in
              patch)
                TARGET_TAG="${TAG_PREFIX}${BASE_MAJOR}.${BASE_MINOR}.$((BASE_PATCH + 1))"
                ;;
              minor)
                TARGET_TAG="${TAG_PREFIX}${BASE_MAJOR}.$((BASE_MINOR + 1)).0"
                ;;
              major)
                TARGET_TAG="${TAG_PREFIX}$((BASE_MAJOR + 1)).0.0"
                ;;
              *)
                echo "Unsupported release_strategy: $RELEASE_STRATEGY"
                exit 1
                ;;
            esac
          fi

          if git rev-parse -q --verify "refs/tags/${TARGET_TAG}" >/dev/null; then
            echo "Target tag already exists: ${TARGET_TAG}"
            exit 1
          fi

          echo "target_tag=${TARGET_TAG}" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts from source run
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          run-id: ${{ steps.source.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: promote-assets

      - name: Show downloaded assets
        run: |
          set -euo pipefail
          ls -lh promote-assets
          COUNT=$(find promote-assets -maxdepth 1 -type f | wc -l)
          if [[ "$COUNT" -eq 0 ]]; then
            echo "No files were downloaded from source run artifacts."
            exit 1
          fi

      - name: Write promotion summary
        run: |
          {
            echo "## Promotion Summary"
            echo "- Image type: ${IMAGE_TYPE}"
            echo "- Source CI tag: ${{ steps.source.outputs.source_tag }}"
            echo "- Source build run: ${{ steps.source.outputs.source_name }} (run_id: ${{ steps.source.outputs.run_id }})"
            echo "- Artifact name: ${ARTIFACT_NAME}"
            echo "- Version strategy: ${RELEASE_STRATEGY}"
            echo "- Target tag: ${{ steps.target.outputs.target_tag }}"
            echo "- Target channel: ${RELEASE_CHANNEL}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve source commit from manifest
        id: source_meta
        uses: ./.github/actions/resolve-manifest-meta
        with:
          manifest_dir: promote-assets

      - name: Render stable release notes
        id: render_notes
        run: |
          set -euo pipefail
          TEMPLATE=".github/release-notes/stable-release.md"
          OUTPUT="stable-release-notes.md"
          REPO_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          REPO_SLUG="${GITHUB_REPOSITORY}"

          sed \
            -e "s|{{TARGET_TAG}}|${{ steps.target.outputs.target_tag }}|g" \
            -e "s|{{SOURCE_TAG}}|${{ steps.source.outputs.source_tag }}|g" \
            -e "s|{{IMAGE}}|${{ steps.source_meta.outputs.image }}|g" \
            -e "s|{{COMMIT}}|${{ steps.source_meta.outputs.commit }}|g" \
            -e "s|{{SHORT_SHA}}|${{ steps.source_meta.outputs.short_sha }}|g" \
            -e "s|{{SSH_MODE}}|${{ steps.source_meta.outputs.ssh_mode }}|g" \
            -e "s|{{REPO_URL}}|${REPO_URL}|g" \
            -e "s|{{REPO_SLUG}}|${REPO_SLUG}|g" \
            "$TEMPLATE" > "$OUTPUT"

          echo "notes_path=${OUTPUT}" >> "$GITHUB_OUTPUT"

      - name: Create release from promoted assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.target.outputs.target_tag }}
          name: "${{ github.event.inputs.image_type }} ${{ steps.target.outputs.target_tag }}"
          files: promote-assets/*
          body_path: ${{ steps.render_notes.outputs.notes_path }}
          prerelease: ${{ steps.channel.outputs.prerelease }}
          make_latest: false
          draft: false
          generate_release_notes: false
