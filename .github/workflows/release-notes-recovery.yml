name: Release Notes Recovery

on:
  workflow_dispatch:
    inputs:
      target_commitish:
        description: Commit SHA or ref to generate notes for
        required: true
        type: string
      tag_name:
        description: Release tag to create or update (for example v0.1.0-restored)
        required: true
        type: string
      previous_tag_name:
        description: Optional previous tag to diff against for note generation
        required: false
        type: string
      create_release:
        description: Create or update the GitHub release with generated notes
        required: true
        type: boolean
        default: false
      draft:
        description: Create the release as a draft when create_release is true
        required: true
        type: boolean
        default: true
      prerelease:
        description: Mark the release as a prerelease when create_release is true
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  generate-release-notes:
    name: Generate Release Notes
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate target commit exists
        run: |
          git fetch --tags --force --quiet
          git rev-parse --verify "${{ inputs.target_commitish }}^{commit}" > /dev/null

      - name: Generate release notes
        id: notes
        uses: actions/github-script@v7
        with:
          script: |
            const targetCommitish = `${{ inputs.target_commitish }}`;
            const tagName = `${{ inputs.tag_name }}`;
            const previousTagName = `${{ inputs.previous_tag_name }}`.trim();

            const payload = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              target_commitish: targetCommitish,
            };

            if (previousTagName) {
              payload.previous_tag_name = previousTagName;
            }

            const response = await github.request(
              'POST /repos/{owner}/{repo}/releases/generate-notes',
              payload,
            );

            core.setOutput('name', response.data.name);
            core.setOutput('body', response.data.body);

      - name: Save generated release notes artifact
        run: |
          cat <<'EOF' > generated-release-notes.md
          # ${{ steps.notes.outputs.name }}

          ${{ steps.notes.outputs.body }}
          EOF

      - name: Upload generated release notes
        uses: actions/upload-artifact@v4
        with:
          name: generated-release-notes-${{ inputs.tag_name }}
          path: generated-release-notes.md
          retention-days: 30

      - name: Create or update GitHub release
        if: inputs.create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.tag_name }}
          target_commitish: ${{ inputs.target_commitish }}
          body: ${{ steps.notes.outputs.body }}
          name: ${{ steps.notes.outputs.name }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          make_latest: false