name: Smart Device OS Build

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'yocto/**'
      - 'scripts/**'
      - 'tests/**'
      - '.github/actions/**'
      - '.github/workflows/**'
      - '.github/actions/*'
  push:
    branches: [ main ]
    paths:
      - 'yocto/**'
      - 'scripts/**'
      - 'tests/**'
      - '.github/actions/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      spdx_enabled:
        description: 'Enable Yocto SPDX generation (create-spdx) for this run (default: disabled for faster CI).'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      vigiles_enabled:
        description: 'Enable Timesys Vigiles vulnerability scanning (default: disabled for faster CI).'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      buildhistory_enabled:
        description: 'Enable buildhistory for package size analysis (default: disabled for faster CI).'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      ssh_access_mode:
        description: 'SSH access policy for this build: public-hardened (no baked admin key) or internal-keyed (bake key from secret).'
        required: false
        default: 'public-hardened'
        type: choice
        options:
          - public-hardened
          - internal-keyed

concurrency:
  group: smart-device-os-${{ github.ref }}
  cancel-in-progress: false

env:
  CI_BUILD_IMAGE: core-image-medtech
  SPDX_ENABLED: ${{ github.event.inputs.spdx_enabled || 'false' }}
  VIGILES_ENABLED: ${{ github.event.inputs.vigiles_enabled || 'false' }}
  BUILDHISTORY_ENABLED: ${{ github.event.inputs.buildhistory_enabled || 'false' }}
  GIT_TERMINAL_PROMPT: "0"

jobs:
  # ── 1. Detect whether changes affect Yocto build (positive filter) ──
  detect-changes:
    name: Detect Changed Files
    runs-on: ubuntu-22.04
    outputs:
      skip_build: ${{ steps.check.outputs.skip_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed files
        id: check
        run: |
          SKIP_BUILD=true  # Default: skip unless yocto/ changes found

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANGED=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" 2>/dev/null \
                      || git diff --name-only "origin/${{ github.base_ref }}"...HEAD 2>/dev/null \
                      || echo "")
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            BEFORE="${{ github.event.before }}"
            # All-zeros = initial push or force-push; treat as full build
            if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
              CHANGED=""
            else
              CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}" 2>/dev/null || echo "")
            fi
          else
            # workflow_dispatch — always full build
            CHANGED=""
          fi

          echo "Changed files:"
          echo "${CHANGED:-<none detected — assuming full build>}"

          # Only trigger full Yocto build for yocto/ changes.
          # Changes to scripts/, tests/, .github/actions/, .github/workflows/ only trigger sanity checks.
          if [[ -z "$CHANGED" ]]; then
            # No diff context available (workflow_dispatch / initial push) -> full build.
            SKIP_BUILD=false
          else
            YOCTO_AFFECTED=$(echo "$CHANGED" | grep -E '^yocto/' || true)
            if [[ -n "$YOCTO_AFFECTED" ]]; then
              SKIP_BUILD=false
            fi
          fi

          echo "skip_build=$SKIP_BUILD" >> "$GITHUB_OUTPUT"
          echo "Build-affecting files (yocto/ only):"
          echo "Result: skip_build=$SKIP_BUILD (Yocto build: $([ "$SKIP_BUILD" == "false" ] && echo "YES" || echo "NO"))"

  # ── 2a. Fast-fail CI sanity checks (always run) ─────────────────────────────
  # These checks run first and hard-fail immediately if they detect errors.
  # They are fast (< 1 min) so PRs can be merged quickly with passing sanity checks,
  # even while the full Yocto build runs in the background.
  #
  # Hard-fail triggers (unblocks merge only if passing):
  #   - YAML syntax validation (.github/workflows/*.yml, .github/actions/*/action.yml)
  #   - Bash script syntax validation (scripts/*.sh)
  #
  # Validation scope:
  #   - These checks validate scripts/ changes, but do NOT trigger full Yocto build
  #   - Full Yocto build only triggers on yocto/ changes (see detect-changes job)
  #   - Allows script/packaging fixes to be merged quickly without waiting for 5h build
  fast-fail-ci-sanity:
    name: Fast-Fail CI Sanity
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Lint all workflows with actionlint
        uses: ./.github/actions/lint-workflows

      - name: Validate bash script syntax
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(scripts/*.sh)
          if (( ${#files[@]} == 0 )); then
            echo "No shell scripts found under scripts/."
            exit 0
          fi

          for file in "${files[@]}"; do
            echo "Checking ${file}"
            bash -n "${file}"
          done
          echo "All shell scripts passed bash -n syntax checks."

  # ── 2b. Non-build-affecting changes: validate YAML, skip image build ────────
  validate-yaml:
    name: Validate Workflow YAML
    needs: detect-changes
    if: needs.detect-changes.outputs.skip_build == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Lint all workflows with actionlint
        uses: ./.github/actions/lint-workflows

  # ── 2c. Full image build path ─────────────────────────────────────────────
  # Hard-fail triggers (build must succeed or job fails):
  #   - Yocto build (core-image-medtech compilation)
  #   - Artifact finalization (SHA256SUMS, manifest, bundle must exist)
  #
  # Non-fatal downstream tasks (continue even on failure, never block merge/release):
  #   - Packaging & verification (continue-on-error: true)
  #   - Artifact upload (continue-on-error: true)
  #   - Tagging (continue-on-error: true)
  #   - Vigiles reports (continue-on-error: true)
  #
  # This ensures artifacts are NEVER lost, and packaging/tagging/scanning issues
  # don't prevent image release or block PR merges. Artifacts are always available
  # for diagnostics even if downstream tasks fail.
  build:
    name: Build Yocto Image
    needs:
      - detect-changes
      - fast-fail-ci-sanity
    if: needs.detect-changes.outputs.skip_build == 'false'
    runs-on: ubuntu-22.04
    # GitHub-hosted runners cap a single job at 360 minutes.
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required for semver tag lookup

      - name: Free up disk space on GitHub runner
        run: |
          echo "=== BEFORE CLEANUP ==="
          df -h / | head -2

          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/hostedtoolcache/PyPy
          sudo rm -rf /opt/hostedtoolcache/Ruby
          sudo rm -rf /opt/hostedtoolcache/go
          sudo rm -rf /opt/hostedtoolcache/node
          sudo rm -rf /opt/hostedtoolcache/Python
          sudo rm -rf /opt/hostedtoolcache/stack

          sudo docker image prune -af
          sudo docker container prune -f
          sudo docker volume prune -f

          sudo apt-get purge -y llvm-* gcc-* g++ gfortran-* mingw-* golang ruby ruby-* \
            php* dotnet-* powershell mono-* mysql-* postgresql-* 2>/dev/null || true
          sudo apt-get autoremove -y
          sudo apt-get clean

          sudo systemctl stop snapd || true
          sudo snap remove --purge amazon-linux-agent 2>/dev/null || true
          sudo snap remove --purge lxd 2>/dev/null || true
          sudo snap remove --purge core20 2>/dev/null || true
          sudo snap remove --purge snapd 2>/dev/null || true
          sudo rm -rf /var/lib/snapd /snap

          echo ""
          echo "=== AFTER CLEANUP ==="
          df -h / | head -2
          echo ""
          AVAIL_GB=$(df -BG / | awk 'NR==2 {gsub("G", "", $4); print $4}')
          echo "Available disk: ${AVAIL_GB} GB (target: >=12 GB)"
          if (( AVAIL_GB < 12 )); then
            echo "WARNING: Less than 12 GB available; build may fail."
          fi

      - name: Set up build environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gawk wget git diffstat unzip texinfo gcc g++ build-essential \
            chrpath socat cpio python3 python3-pip python3-pexpect \
            xz-utils debianutils iputils-ping curl file locales \
            autoconf automake libtool pkg-config gettext \
            patch perl bison flex gperf \
            qemu-system-arm qemu-system-x86 qemu-user-static
          echo "Build environment ready"

      - name: Clone Poky kirkstone (shallow)
        run: |
          mkdir -p yocto
          cd yocto
          git clone -b kirkstone --depth 1 https://git.yoctoproject.org/git/poky poky
          du -sh poky

      - name: Clone meta-openembedded (keep essential sublayers only)
        run: |
          cd yocto
          git clone -b kirkstone --depth 1 \
            https://github.com/openembedded/meta-openembedded.git meta-openembedded

          find meta-openembedded -mindepth 1 -maxdepth 1 -type d \
            ! -name meta-oe \
            ! -name meta-python \
            ! -name meta-networking \
            -exec rm -rf {} +

          du -sh meta-openembedded

      - name: Clone meta-qt6
        run: |
          cd yocto
          git clone -b 6.4 --depth 1 \
            https://code.qt.io/yocto/meta-qt6.git meta-qt6 \
            || git clone -b 6.4 --depth 1 \
              https://github.com/meta-qt6/meta-qt6.git meta-qt6
          du -sh meta-qt6

      - name: Clone meta-timesys
        run: |
          cd yocto
          git clone -b kirkstone --depth 1 \
            https://github.com/TimesysGit/meta-timesys.git meta-timesys
          du -sh meta-timesys

      - name: Initialize build directory
        run: |
          cd yocto
          source poky/oe-init-build-env build > /dev/null 2>&1
          cp ../conf/local.conf.sample conf/local.conf
          cp ../conf/bblayers.conf.sample conf/bblayers.conf

          {
            echo "MEDTECH_ENABLE_SPDX = \"${SPDX_ENABLED}\""
            echo "MEDTECH_ENABLE_VIGILES = \"${VIGILES_ENABLED}\""
            echo "MEDTECH_ENABLE_BUILDHISTORY = \"${BUILDHISTORY_ENABLED}\""
          } >> conf/local.conf
          echo "Optional features: SPDX=${SPDX_ENABLED} Vigiles=${VIGILES_ENABLED} buildhistory=${BUILDHISTORY_ENABLED}"

          echo "# GitHub-hosted runners do not persist build cache between jobs" >> conf/local.conf
          echo "Build directory initialized"

      - name: Pre-build disk audit
        run: |
          echo "=== PRE-BUILD DISK AUDIT ==="
          du -sh yocto/* 2>/dev/null | sort -rh || true
          echo ""
          df -h
          echo ""
          echo "Estimated peak TMPDIR usage:"
          echo "  bitbake parsing: 2-3 GB"
          echo "  fetch phase: 5-8 GB"
          echo "  build phase: 20-30 GB"
          echo "  image phase: 5-10 GB"
          echo "  TOTAL PEAK: 32.5-51.5 GB (without aggressive minimization)"
          echo ""

          AVAIL_GB=$(df -BG / | awk 'NR==2 {gsub("G", "", $4); print $4}')
          echo "Available: ${AVAIL_GB} GB"
          if (( AVAIL_GB < 5 )); then
            echo "CRITICAL: Less than 5 GB available; build will fail."
            exit 1
          fi

      - name: Configure Vigiles key file
        env:
          VIGILES_KEY_DATA: ${{ secrets.VIGILES_KEY_DATA }}
        run: |
          if [[ "${VIGILES_ENABLED}" != "true" ]]; then
            echo "Vigiles is disabled (VIGILES_ENABLED=${VIGILES_ENABLED}). Skipping key configuration."
            exit 0
          fi

          if [[ -z "${VIGILES_KEY_DATA}" ]]; then
            echo "WARNING: Vigiles enabled but VIGILES_KEY_DATA is not set."
            echo "Vulnerability report generation will be unavailable for this run."
            exit 0
          fi

          KEY_FILE="$(mktemp "${RUNNER_TEMP}/vigiles-key-XXXXXX")"
          printf '%s' "${VIGILES_KEY_DATA}" > "${KEY_FILE}"
          chmod 600 "${KEY_FILE}"
          echo "VIGILES_KEY_FILE=${KEY_FILE}" >> "${GITHUB_ENV}"
          echo "Vigiles key file configured and enabled"

      - name: Configure SSH access mode
        id: ssh_access
        env:
          SSH_ACCESS_MODE_INPUT: ${{ github.event.inputs.ssh_access_mode }}
          MEDTECH_ADMIN_SSH_PUBLIC_KEY: ${{ secrets.MEDTECH_ADMIN_SSH_PUBLIC_KEY }}
        run: |
          MODE="public-hardened"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${SSH_ACCESS_MODE_INPUT:-}" ]]; then
            MODE="${SSH_ACCESS_MODE_INPUT}"
          fi

          case "$MODE" in
            public-hardened|internal-keyed)
              ;;
            *)
              echo "Invalid ssh_access_mode: $MODE"
              exit 2
              ;;
          esac

          echo "SSH_ACCESS_MODE=${MODE}" >> "${GITHUB_ENV}"
          echo "mode=${MODE}" >> "${GITHUB_OUTPUT}"

          if [[ "$MODE" == "public-hardened" ]]; then
            echo "Public hardened mode selected: no admin SSH key will be baked into the image."
            exit 0
          fi

          if [[ -z "${MEDTECH_ADMIN_SSH_PUBLIC_KEY:-}" ]]; then
            echo "internal-keyed mode requires GitHub secret MEDTECH_ADMIN_SSH_PUBLIC_KEY."
            exit 1
          fi

          KEY_FILE="$(mktemp "${RUNNER_TEMP}/medtech-admin-key-XXXXXX.pub")"
          printf '%s\n' "${MEDTECH_ADMIN_SSH_PUBLIC_KEY}" > "${KEY_FILE}"
          chmod 600 "${KEY_FILE}"

          KEY_LINE="$(grep -v '^[[:space:]]*#' "${KEY_FILE}" | sed '/^[[:space:]]*$/d' | head -n 1 || true)"
          if [[ -z "${KEY_LINE}" ]]; then
            echo "MEDTECH_ADMIN_SSH_PUBLIC_KEY secret is empty after filtering comments/blank lines."
            exit 1
          fi

          if ! printf '%s\n' "${KEY_LINE}" | grep -Eq '^(ssh-ed25519|ssh-rsa|ecdsa-sha2-nistp256|ecdsa-sha2-nistp384|ecdsa-sha2-nistp521) '; then
            echo "MEDTECH_ADMIN_SSH_PUBLIC_KEY does not look like a valid SSH public key line."
            exit 1
          fi

          printf '%s\n' "${KEY_LINE}" > "${KEY_FILE}"
          echo "MEDTECH_ADMIN_KEY_FILE=${KEY_FILE}" >> "${GITHUB_ENV}"
          echo "Internal keyed mode selected: admin SSH public key file configured."

      - name: Apply CI local.conf toggles
        run: |
          LOCAL_CONF="yocto/build/conf/local.conf"

          # Vigiles: enable only if explicitly requested AND key is available
          if [[ "${VIGILES_ENABLED}" == "true" && -n "${VIGILES_KEY_FILE:-}" ]]; then
            echo "VIGILES_KEY_FILE = \"${VIGILES_KEY_FILE}\"" >> "${LOCAL_CONF}"
            echo "Vigiles enabled and key file configured."
          else
            echo "# Vigiles disabled (VIGILES_ENABLED=${VIGILES_ENABLED}, key available: $([[ -n \"${VIGILES_KEY_FILE:-}\" ]] && echo yes || echo no))" >> "${LOCAL_CONF}"
            echo "Vigiles vulnerability scanning disabled for this build."
          fi

          if [[ "${SSH_ACCESS_MODE:-public-hardened}" == "internal-keyed" ]]; then
            if [[ -z "${MEDTECH_ADMIN_KEY_FILE:-}" ]]; then
              echo "Internal keyed mode selected but MEDTECH_ADMIN_KEY_FILE is unset."
              exit 1
            fi
            echo "MEDTECH_ADMIN_KEY_FILE = \"${MEDTECH_ADMIN_KEY_FILE}\"" >> "${LOCAL_CONF}"
            echo "Configured local.conf with workflow-provided MedTech admin SSH key file."
          else
            echo "MEDTECH_ADMIN_AUTHORIZED_KEY = \"\"" >> "${LOCAL_CONF}"
            echo "MEDTECH_ADMIN_KEY_FILE = \"/nonexistent/medtech-admin-key.pub\"" >> "${LOCAL_CONF}"
            echo "Public hardened mode enforced: image will ship without a baked admin SSH key."
          fi

      - name: Yocto preflight (fast-fail metadata and URI checks)
        run: |
          cd yocto/build
          source ../poky/oe-init-build-env . > /dev/null 2>&1

          set -o pipefail
          : > build.log

          echo "=== PREFLIGHT: metadata parse and provider resolution ===" | tee -a build.log
          # Parse metadata once and fail fast on layer/config breakage.
          bitbake -p 2>&1 | tee -a build.log

          echo "=== PREFLIGHT: custom recipe URI validation ===" | tee -a build.log
          bitbake -k \
            python3-paho-mqtt \
            medtech-system \
            medtech-vitals-publisher \
            medtech-clinician-ui \
            -c checkuri 2>&1 | tee -a build.log
          echo "=== PREFLIGHT: fetch contract-dependent sources ===" | tee -a build.log
          bitbake -k \
            medtech-system \
            medtech-vitals-publisher \
            medtech-edge-analytics \
            medtech-clinician-ui \
            -c fetch 2>&1 | tee -a build.log
      - name: Build CI image
        run: |
          cd yocto/build
          source ../poky/oe-init-build-env . > /dev/null 2>&1

          set -o pipefail
          echo "=== BITBAKE BUILD: ${CI_BUILD_IMAGE} (rm_work expected in local.conf) ===" | tee -a build.log
          bitbake -k "${CI_BUILD_IMAGE}" 2>&1 | tee -a build.log

      - name: Dump failed BitBake task logs
        if: failure()
        run: |
          echo "=== FAILED TASK LOG TAILS ==="
          cd yocto/build

          if [ -f build.log ]; then
            echo ""
            echo "=== FAILED TASKS FROM build.log ==="
            grep -nE "ERROR: Task \([^)]*\) failed" build.log | tail -n 20 || true
          fi

          echo ""
          echo "=== HOST TOOL VERSIONS (native configure context) ==="
          autoconf --version | head -n 1 || true
          automake --version | head -n 1 || true
          libtoolize --version | head -n 1 || true
          gettext --version | head -n 1 || true
          autopoint --version | head -n 1 || true
          bison --version | head -n 1 || true
          flex --version | head -n 1 || true
          patch --version | head -n 1 || true
          diff --version | head -n 1 || true

          FAILED_BB=""
          if [ -f build.log ]; then
            FAILED_BB=$(grep -E "ERROR: Task \([^)]*\.bb:[^)]+\) failed" build.log | tail -n 1 | sed -E 's#.*Task \(([^)]*\.bb):[^)]*\).*#\1#' || true)
          fi
          FAILED_BASENAME=$(basename "$FAILED_BB" .bb)
          FAILED_PN="${FAILED_BASENAME%_*}"

          echo ""
          echo "=== DETECTED FAILED RECIPE ==="
          echo "FAILED_BB=$FAILED_BB"
          echo "FAILED_PN=$FAILED_PN"

          if [ -z "$FAILED_PN" ]; then
            echo "Could not infer failed recipe name from build.log; skipping targeted tail dump."
            exit 0
          fi

          find tmp/work -type f -path "*/${FAILED_PN}/*/temp/log.do_*" | sort > /tmp/bitbake-task-logs.txt || true
          tail -n 40 /tmp/bitbake-task-logs.txt || true

          while IFS= read -r logfile; do
            echo ""
            echo "--- $logfile ---"
            tail -n 120 "$logfile" || true
          done < <(tail -n 12 /tmp/bitbake-task-logs.txt)

          echo ""
          echo "=== TARGETED CONFIG LOG FOR FAILED RECIPE ==="
          find tmp/work -type f -path "*/${FAILED_PN}/*/build/config.log" -print -exec tail -n 200 {} \; || true

      - name: Collect failed recipe debug logs
        if: failure()
        run: |
          mkdir -p artifacts-debug
          cd yocto/build

          FAILED_BB=""
          if [ -f build.log ]; then
            FAILED_BB=$(grep -E "ERROR: Task \([^)]*\.bb:[^)]+\) failed" build.log | tail -n 1 | sed -E 's#.*Task \(([^)]*\.bb):[^)]*\).*#\1#' || true)
          fi
          FAILED_BASENAME=$(basename "$FAILED_BB" .bb)
          FAILED_PN="${FAILED_BASENAME%_*}"

          {
            echo "FAILED_BB=$FAILED_BB"
            echo "FAILED_PN=$FAILED_PN"
          } > ../../artifacts-debug/failed-recipe-summary.txt

          cp build.log ../../artifacts-debug/ 2>/dev/null || true

          if [ -n "$FAILED_PN" ]; then
            find tmp/work -type f -path "*/${FAILED_PN}/*/temp/log.do_*" -exec cp --parents {} ../../artifacts-debug/ \; 2>/dev/null || true
            find tmp/work -type f -path "*/${FAILED_PN}/*/temp/run.do_*" -exec cp --parents {} ../../artifacts-debug/ \; 2>/dev/null || true
            find tmp/work -type f -path "*/${FAILED_PN}/*/build/config.log" -exec cp --parents {} ../../artifacts-debug/ \; 2>/dev/null || true
            bitbake -e "$FAILED_PN" > "../../artifacts-debug/bitbake-env-${FAILED_PN}.txt" 2>/dev/null || true
          fi

          cd ../..
          echo "=== DEBUG ARTIFACTS READY (FAILED RECIPE ONLY) ==="
          find artifacts-debug -type f | head -n 200 || true

      - name: Upload failed recipe debug logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: yocto-debug-failed-recipe
          path: artifacts-debug/
          retention-days: 30
          if-no-files-found: warn

      - name: Clean up build artifacts to free space
        if: always()
        run: |
          echo "=== POST-BUILD CLEANUP ==="

          cd yocto/build
          echo "Before cleanup:"
          du -sh tmp/ 2>/dev/null || true
          rm -rf tmp/work 2>/dev/null || true
          rm -rf tmp/work-shared 2>/dev/null || true
          rm -rf tmp/sysroots-components 2>/dev/null || true
          rm -rf tmp/cache 2>/dev/null || true
          echo "After cleanup:"
          du -sh tmp/ 2>/dev/null || true

          rm -rf ../sstate-cache 2>/dev/null || true
          rm -rf ../downloads 2>/dev/null || true

          echo ""
          echo "=== POST-BUILD DISK STATUS ==="
          df -h / | tail -1

      - name: Verify image was built
        run: |
          IMAGE="yocto/build/tmp/deploy/images/qemuarm64/${CI_BUILD_IMAGE}-qemuarm64.ext4"
          if [ -f "$IMAGE" ]; then
            SIZE=$(du -sh "$IMAGE" | cut -f1)
            echo "Image built successfully: $SIZE"
            file "$IMAGE"
          else
            echo "Image not found"
            exit 1
          fi

      - name: Enforce no debug/dev packages in final image
        run: |
          MANIFEST="yocto/build/tmp/deploy/images/qemuarm64/${CI_BUILD_IMAGE}-qemuarm64.manifest"
          if [ ! -f "$MANIFEST" ]; then
            echo "Manifest not found: $MANIFEST"
            exit 1
          fi

          if grep -E '(-dbg|-dev|-staticdev)\b' "$MANIFEST"; then
            echo "Found forbidden debug/development packages in image manifest"
            exit 1
          fi

          if grep -E '\b(gdb|strace|ltrace|perf|valgrind|quilt)\b' "$MANIFEST"; then
            echo "Found forbidden debug tooling packages in image manifest"
            exit 1
          fi

          echo "Manifest policy check passed"

      - name: Sanity check Python runtime coverage
        if: env.CI_BUILD_IMAGE == 'core-image-medtech'
        run: |
          bash scripts/verify-image.sh python-sanity

      - name: Process SPDX SBOM
        if: env.SPDX_ENABLED == 'true' && env.CI_BUILD_IMAGE == 'core-image-medtech'
        run: |
          echo "=== Collecting SPDX SBOM ==="
          bash scripts/process-sbom.sh || true

      - name: Collect SPDX artifacts
        if: env.SPDX_ENABLED == 'true'
        run: |
          mkdir -p artifacts/spdx
          if [[ -d sbom ]]; then
            find sbom -maxdepth 1 -type f -exec cp {} artifacts/spdx/ \;
          fi

      - name: Write SPDX status
        run: |
          mkdir -p artifacts
          COUNT=0
          if [[ -d artifacts/spdx ]]; then
            COUNT=$(find artifacts/spdx -maxdepth 1 -type f | wc -l)
          fi
          {
            echo "spdx_enabled=${SPDX_ENABLED}"
            echo "spdx_files_collected=${COUNT}"
            echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            if [[ "${SPDX_ENABLED}" != "true" ]]; then
              echo "note=SPDX generation disabled by default; enable via manual workflow input spdx_enabled=true."
            elif [[ "${COUNT}" -eq 0 ]]; then
              echo "note=SPDX was enabled but no files were collected. Check build logs for create-spdx output."
            else
              echo "note=SPDX artifacts were collected successfully."
            fi
          } > artifacts/spdx-status.txt

      - name: Collect Timesys Vigiles vulnerability report
        if: env.VIGILES_ENABLED == 'true'
        run: |
          MACHINE="qemuarm64"
          mkdir -p artifacts/vigiles

          mapfile -t DEPLOY_REPORTS < <(find yocto/build/tmp/deploy -type f \
            \( -iname '*vigiles*' -o -iname '*timesys*' -o -iname '*vuln*' -o -iname '*cve*' \) \
            \( -iname '*.json' -o -iname '*.csv' -o -iname '*.txt' -o -iname '*.xml' -o -iname '*.html' \) \
            2>/dev/null | sort)

          mapfile -t VIGILES_OUTPUTS < <(find yocto/build/vigiles -maxdepth 1 -type f \
            \( -name 'core-image-medtech-cve.json' -o -name 'linux-yocto-*.config' \) \
            2>/dev/null | sort)

          REPORTS=("${DEPLOY_REPORTS[@]}" "${VIGILES_OUTPUTS[@]}")
          mapfile -t REPORTS < <(printf '%s\n' "${REPORTS[@]}" | sed '/^$/d' | sort -u)

          if [[ ${#REPORTS[@]} -eq 0 ]]; then
            echo "No Vigiles vulnerability report files found under yocto/build/tmp/deploy or yocto/build/vigiles"
            echo "Check that conf/local.conf includes: INHERIT += \"vigiles\""
            echo "And verify the VIGILES_KEY_DATA secret contains a valid key payload."
            {
              echo "vigiles_reports_found=0"
              echo "machine=${MACHINE}"
              echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo "note=Vigiles reports were not available; build artifacts were still produced."
            } > "artifacts/vigiles/core-image-medtech-${MACHINE}-vigiles-status.txt"
            exit 0
          fi

          for report in "${REPORTS[@]}"; do
            cp --parents "${report}" artifacts/vigiles/
          done

          printf '%s\n' "${REPORTS[@]}" > "artifacts/vigiles/core-image-medtech-${MACHINE}-vigiles-report-files.txt"
          {
            echo "vigiles_reports_found=${#REPORTS[@]}"
            echo "machine=${MACHINE}"
            echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > "artifacts/vigiles/core-image-medtech-${MACHINE}-vigiles-status.txt"
          echo "Found ${#REPORTS[@]} Vigiles-related report file(s)."

      - name: Package and verify release bundle
        continue-on-error: true
        uses: ./.github/actions/package-verify-bundle
        with:
          image_name: ${{ env.CI_BUILD_IMAGE }}
          machine: qemuarm64
          commit: ${{ github.sha }}
          ssh_mode: ${{ env.SSH_ACCESS_MODE || 'public-hardened' }}

      - name: Prepare private Vigiles bundle
        if: env.VIGILES_ENABLED == 'true'
        uses: ./.github/actions/prepare-private-vigiles
        with:
          machine: qemuarm64
          image_name: core-image-medtech
          private_artifacts_dir: private-artifacts
          passphrase: ${{ secrets.VIGILES_PRIVATE_BUNDLE_PASSPHRASE }}
          exclude_from_public: 'true'

      - name: Finalize upload directory
        run: |
          set -euo pipefail
          REQUIRED=(
            "artifacts/${CI_BUILD_IMAGE}-qemuarm64-bundle.tar.gz"
            "artifacts/${CI_BUILD_IMAGE}-qemuarm64-manifest.json"
            "artifacts/SHA256SUMS"
          )

          for f in "${REQUIRED[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "Missing required release artifact: $f"
              exit 1
            fi
          done

          echo "=== ARTIFACTS READY ==="
          ls -lh artifacts/
          du -sh artifacts/
          rm -rf yocto

      - name: Upload private Vigiles bundle
        continue-on-error: true
        uses: ./.github/actions/upload-artifact-helper
        if: success()
        with:
          name: qemu-image-medtech-vigiles-private
          path: private-artifacts/
          retention_days: '14'
          if_no_files_found: warn

      - name: Upload artifacts
        continue-on-error: true
        uses: ./.github/actions/upload-artifact-helper
        if: success()
        with:
          name: qemu-image-medtech
          path: artifacts/
          retention_days: '30'
          if_no_files_found: error
      # === CI Tagging (no GitHub Release creation in this workflow) ===
      # Policy:
      # - PR builds create dev-pr-* tags
      # - push to main creates dev-main-* tags
      # - workflow_dispatch creates dev-manual-* tags
      # Stable/public releases are created intentionally via promotion workflow.

      - name: Compute CI tag
        id: ci_tag
        continue-on-error: true
        uses: ./.github/actions/compute-ci-tag
        if: success()
        with:
          push_prefix: dev-core-image-medtech-main
          non_push_prefix: ${{ github.event_name == 'pull_request' && format('dev-core-image-medtech-pr-{0}', github.event.pull_request.number) || 'dev-core-image-medtech-manual' }}
      - name: Create and push CI tag
        continue-on-error: true
        if: success() && github.event_name != 'pull_request'
        uses: ./.github/actions/create-git-tag
        with:
          tag_name: ${{ steps.ci_tag.outputs.tag }}
          target_sha: ${{ github.sha }}
          push_token: ${{ secrets.CI_TAG_PUSH_TOKEN }}

      - name: Note skipped tag push for fork PRs
        if: success() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "Fork pull_request detected. GITHUB_TOKEN does not have permission to push tags to base repository."
          echo "Computed tag (not pushed): ${{ steps.ci_tag.outputs.tag }}"

      - name: Cleanup temporary key files
        if: always()
        uses: ./.github/actions/cleanup-files
        with:
          paths: |
            ${{ env.VIGILES_KEY_FILE }}
            ${{ env.MEDTECH_ADMIN_KEY_FILE }}

      - name: Final disk report
        if: always()
        run: |
          echo "=== FINAL DISK STATUS ==="
          df -h / | tail -1

