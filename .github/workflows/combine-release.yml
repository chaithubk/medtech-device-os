# Combined Release Workflow
# This workflow bundles multiple release artifacts and generates a summary.


name: Multi-Image Release Bundle

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
      release_type:
        description: 'Type of release (release/prerelease)'
        required: true
        default: 'release'
      grouped_release_tags:
        description: 'Comma-separated release tags to combine (e.g., core-image-minimal-v1.0.0,core-image-medtech-v1.0.0). If empty, defaults to core-image-minimal/core-image-medtech for release_version.'
        required: false
        default: ''

jobs:
  combine:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare combined release notes from template
        id: notes
        run: |
          python .github/scripts/generate-combined-release.py
          cat combined-release.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ github.event.inputs.release_version }}
          GROUPED_RELEASE_TAGS: ${{ github.event.inputs.grouped_release_tags }}

      - name: Get commit of first sub-release tag
        id: get_commit
        run: |
          set -euo pipefail

          GROUPED_TAGS="${{ github.event.inputs.grouped_release_tags }}"
          RELEASE_VERSION="${{ github.event.inputs.release_version }}"

          if [[ -z "${GROUPED_TAGS// }" ]]; then
            GROUPED_TAGS="core-image-minimal-${RELEASE_VERSION},core-image-medtech-${RELEASE_VERSION}"
          fi

          FIRST_TAG=$(echo "$GROUPED_TAGS" | cut -d',' -f1 | xargs)
          if [[ -z "$FIRST_TAG" ]]; then
            echo "Unable to determine first sub-release tag from grouped_release_tags input." >&2
            exit 1
          fi

          REF_TYPE=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${FIRST_TAG}" --jq '.object.type')
          REF_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${FIRST_TAG}" --jq '.object.sha')

          if [[ "$REF_TYPE" == "tag" ]]; then
            COMMIT_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${REF_SHA}" --jq '.object.sha')
          else
            COMMIT_SHA="$REF_SHA"
          fi

          echo "Resolved ${FIRST_TAG} -> ${COMMIT_SHA}"
          echo "commit_sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN != '' && secrets.RELEASE_PUSH_TOKEN || github.token }}

      - name: Upload combined release notes
        uses: actions/upload-artifact@v4
        with:
          name: combined-release-md
          path: combined-release.md

      - name: Create multi-image release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_version }}
          name: ${{ github.event.inputs.release_version }}
          body_path: combined-release.md
          draft: false
          prerelease: ${{ github.event.inputs.release_type == 'prerelease' }}
          token: ${{ secrets.RELEASE_PUSH_TOKEN != '' && secrets.RELEASE_PUSH_TOKEN || github.token }}
          target_commitish: ${{ steps.get_commit.outputs.commit_sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
