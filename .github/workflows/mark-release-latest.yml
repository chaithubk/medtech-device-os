name: Mark Release as Stable

# ---------------------------------------------------------------------------
# RELEASE PROCESS — how to use this workflow
# ---------------------------------------------------------------------------
# PURPOSE
#   Final sign-off step after a prerelease has been validated.
#   Flips an existing prerelease to stable (prerelease: false).
#   make_latest is NEVER set — each image type has its own release series;
#   "latest" for a given image is simply the highest semver tag with that
#   image's prefix (e.g. core-image-minimal-v*, core-image-medtech-v*).
#
# WHEN TO RUN
#   Only after ALL of the following are confirmed:
#     - Image boots in QEMU without kernel panic.
#     - First-boot SSH provisioning tested end-to-end.
#     - All post-build policy checks passed.
#     - SBOM / Vigiles scan reviewed (if applicable).
#     - Team has agreed the release is production-ready.
#
# HOW TO USE
#   - image_type : select the image this release belongs to (used for
#                  auto-selection filtering when tag is left empty).
#   - tag        : leave empty to auto-select the newest prerelease for
#                  this image type, or enter an exact tag to target one.
#
# PRECEDING STEP
#   Use .github/workflows/promote-prerelease-release.yml with
#   release_channel=prerelease first to create the versioned release.
# ---------------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      image_type:
        description: "Image type to filter when auto-selecting the release."
        required: true
        default: "core-image-minimal"
        type: choice
        options:
          - core-image-minimal
          - core-image-medtech
      tag:
        description: "Prerelease tag to mark as stable (e.g. core-image-minimal-v1.2.3). Leave empty to auto-select the newest prerelease for this image type."
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: mark-release-latest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mark-stable:
    name: Mark Release as Stable
    runs-on: ubuntu-22.04

    steps:
      - name: Resolve target release tag
        id: resolve
        uses: actions/github-script@v7
        env:
          IMAGE_TYPE: ${{ github.event.inputs.image_type }}
          TAG_INPUT: ${{ github.event.inputs.tag }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            const tagInput = (process.env.TAG_INPUT || '').trim();
            const imageType = (process.env.IMAGE_TYPE || '').trim();
            const tagPrefix = imageType ? `${imageType}-v` : '';

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            // Prereleases for this image type, newest first
            const candidates = releases
              .filter(r => r.prerelease && !r.draft &&
                (tagPrefix ? r.tag_name.startsWith(tagPrefix) : true))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const preview = candidates.slice(0, 5).map((r, i) =>
              `${i + 1}. \`${r.tag_name}\` — ${r.name || r.tag_name} (${r.created_at.slice(0, 10)})`
            ).join('\n');

            let selected;

            if (tagInput) {
              selected = releases.find(r => r.tag_name === tagInput);
              if (!selected) {
                core.setFailed(`Tag '${tagInput}' was not found in releases.`);
                return;
              }
            } else {
              if (candidates.length === 0) {
                core.setFailed(
                  `No prerelease found${imageType ? ` for image type '${imageType}'` : ''}. ` +
                  `Run the promote workflow with release_channel=prerelease first.`
                );
                return;
              }
              selected = candidates[0];
            }

            core.setOutput('release_id', String(selected.id));
            core.setOutput('tag_name', selected.tag_name);

            core.summary
              .addHeading('Prerelease Candidates')
              .addRaw(preview || '- none', true)
              .addHeading('Selected Release')
              .addRaw(`\`${selected.tag_name}\` — ID ${selected.id}`, true)
              .write();

      - name: Mark release as stable
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ steps.resolve.outputs.release_id }}
          TAG_NAME: ${{ steps.resolve.outputs.tag_name }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            const releaseId = parseInt(process.env.RELEASE_ID, 10);
            const tagName = process.env.TAG_NAME;

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: releaseId,
              prerelease: false,
              make_latest: 'false',
            });

            core.summary
              .addHeading('Release Marked as Stable')
              .addRaw(
                `- Tag: \`${tagName}\`\n` +
                `- prerelease: false\n` +
                `- make_latest: not changed (each image type has its own release series)`,
                true
              )
              .write();

            core.info(`Release ${tagName} (ID ${releaseId}) is now marked as stable.`);
