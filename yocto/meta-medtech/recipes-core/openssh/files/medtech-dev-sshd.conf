# MedTech QEMU/dev image — OpenSSH server policy override
#
# Installed to /etc/ssh/sshd_config.d/10-medtech-dev.conf
# (drop-in files are read after /etc/ssh/sshd_config and override defaults)
#
# PURPOSE: Allow password-based root login for local QEMU developer workflows.
#
#   - serial console is the primary access path (root, password: root)
#   - SSH on host port 2222 → guest port 22 is a working secondary path
#   - SCP over the same SSH connection is also functional
#
# SECURITY SCOPE: This configuration is intentionally permissive for local
# QEMU/dev use only. The guest VM is reachable only on the loopback address
# (127.0.0.1:2222 via QEMU user-mode networking) and is not exposed to any
# external network. For production images, remove or replace this file and
# enforce key-only authentication and/or a non-root service account.
#
# Root password is set deterministically via EXTRA_USERS_PARAMS in
# medtech-image.bbclass (hashed with SHA-512; plaintext: "root").
# Change both for any production or staging deployment.

PermitRootLogin yes
PasswordAuthentication yes
KbdInteractiveAuthentication no
UsePAM yes
