# MedTech image — OpenSSH server policy override
#
# Installed to /etc/ssh/sshd_config.d/10-medtech-dev.conf
# (drop-in files are read after /etc/ssh/sshd_config and override defaults)
#
# PURPOSE: Enforce production-oriented SSH access defaults.
#
#   - root SSH login is disabled
#   - password-based SSH authentication is disabled
#   - dedicated admin account (MEDTECH_ADMIN_USER) uses SSH public key login
#   - SCP/SFTP continue to work over key-authenticated SSH
#
# SECURITY SCOPE: This policy is intended for both local QEMU workflows and
# production deployments. A local loopback-only QEMU setup further reduces
# exposure, but this policy does not depend on network isolation.
#
# Account provisioning is handled in medtech-image.bbclass:
# - root password is locked
# - admin account password is locked
# - optional MEDTECH_ADMIN_AUTHORIZED_KEY is written to authorized_keys

PermitRootLogin no
PasswordAuthentication no
KbdInteractiveAuthentication no
PubkeyAuthentication yes
UsePAM yes
