# MedTech MQTT Broker Configuration
listener 1883
# NOTE: For production deployments disable anonymous access and configure
# username/password authentication or TLS client certificates.
allow_anonymous true
persistence true
persistence_location /var/lib/mosquitto/
persistence_file medtech.db
max_connections -1

# Logging
log_dest syslog
log_type error
log_type warning
log_type information
