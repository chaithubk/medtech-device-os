# Qt platform configuration for headless/QEMU operation
[Platforms]
# Use offscreen platform for QEMU (no physical display)
# Override with QT_QPA_PLATFORM=xcb when a real display is available
DefaultPlatform=offscreen

[Fonts]
# Minimal font configuration for headless rendering
FontPath=/usr/share/fonts

[Rendering]
# Software rendering for QEMU compatibility
ForceRasterization=true
