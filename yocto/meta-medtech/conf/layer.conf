# =============================================================================
# meta-medtech/conf/layer.conf — MedTech Device OS Layer Configuration
# =============================================================================
#
# This file registers the meta-medtech layer with the BitBake build system.
# It is sourced automatically when the layer is listed in bblayers.conf.
#
# See: https://docs.yoctoproject.org/dev/ref-manual/structure.html#meta-layer-conf
# =============================================================================

# ---------------------------------------------------------------------------
# BBPATH — Add this layer's conf/ and classes/ directories to the global
# BitBake search path. BitBake uses BBPATH to locate .conf files and .bbclass
# files referenced by INHERIT or require/include statements in recipes.
# ---------------------------------------------------------------------------
BBPATH .= ":${LAYERDIR}"

# ---------------------------------------------------------------------------
# BBFILES — Register all recipe files (*.bb) and recipe appends (*.bbappend)
# found under any recipes-* subdirectory of this layer. The double-glob
# pattern requires exactly one directory level between recipes-<category>/
# and the .bb file (i.e. recipes-foo/pkgname/pkgname_ver.bb).
# ---------------------------------------------------------------------------
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

# ---------------------------------------------------------------------------
# BBFILE_COLLECTIONS — Unique name for this layer's file collection.
# Used internally by BitBake for conflict detection and layer ordering.
# ---------------------------------------------------------------------------
BBFILE_COLLECTIONS += "meta-medtech"

# ---------------------------------------------------------------------------
# BBFILE_PATTERN_meta-medtech — Regex that matches all files belonging to this
# layer. Used by BitBake to attribute recipes to the correct collection when
# resolving conflicts between layers.
# ---------------------------------------------------------------------------
BBFILE_PATTERN_meta-medtech = "^${LAYERDIR}/"

# ---------------------------------------------------------------------------
# BBFILE_PRIORITY_meta-medtech — Layer priority (higher = wins on conflicts).
# Priority 6 is one step above the default OpenEmbedded layers (priority 5),
# ensuring our customizations (e.g., mosquitto bbappend) take precedence over
# upstream layer recipes when the same package appears in multiple layers.
# ---------------------------------------------------------------------------
BBFILE_PRIORITY_meta-medtech = "6"

# ---------------------------------------------------------------------------
# LAYERDEPENDS_meta-medtech — Layers that must be present for meta-medtech
# to build correctly. BitBake fails fast if any listed dependency is missing.
#
#   core             — Poky/OE-Core: provides base classes, kernel, busybox, etc.
#   openembedded-layer — meta-oe: provides a wide range of additional packages
#                        (e.g., mosquitto, python3 extensions).
#   networking-layer — meta-networking: provides network tools and daemons.
#   qt6-layer        — meta-qt6: provides Qt6 and its build infrastructure,
#                      required by medtech-clinician-ui.
#
# Keep this list explicit and minimal so CI only provisions required layers.
# ---------------------------------------------------------------------------
LAYERDEPENDS_meta-medtech = "core openembedded-layer networking-layer qt6-layer"

# ---------------------------------------------------------------------------
# LAYERSERIES_COMPAT_meta-medtech — Yocto release series this layer supports.
# BitBake warns (but does not fail) if the active Poky release is not listed.
#
#   kirkstone — LTS release (currently used in CI and dev container)
#   langdale  — Short-term release; kept for forward-compatibility testing
#   scarthgap — Next LTS release; listed to ease future migration
#
# When upgrading Yocto, update this list and test all recipes in CI.
# ---------------------------------------------------------------------------
LAYERSERIES_COMPAT_meta-medtech = "kirkstone langdale scarthgap"
